    <section class="d-flex flex-column flex-md-row bg-wine">

    <section class="mt-5 mb-">
        <div class="container">

                <div class="col d-flex-column">
                    <video src="./photos/video1.mp4" class=" w-100" controls></video>

                </div>
                <div class="col d-flex-column">
                    <img src="./photos/gallery1.jpg" class=" w-100" onclick="FullScreen(this.src)" alt="gallery4">
                    <img src="./photos/gallery5.jpg" class=" w-100" onclick="FullScreen(this.src)" alt="gallery8">
                    <img src="./photos/gallery9.jpg" class=" w-100" onclick="FullScreen(this.src)" alt="gallery8">
                </div>
                <div class="col d-flex-column">
                    <img src="./photos/gallery2.jpg" class=" w-100" onclick="FullScreen(this.src)" alt="gallery4">
                    <img src="./photos/gallery6.jpg" class=" w-100" onclick="FullScreen(this.src)" alt="gallery8">
                    <video src="./photos/video4.mp4" class=" w-100" controls></video>
                </div>
                <div class="col d-flex-column">
                    <img src="./photos/gallery3.jpg" class=" w-100" onclick="FullScreen(this.src)" alt="gallery4">

                </div>
            </div>
        </div>
        <div id="FullScreenImage"
            class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-dark bg-opacity-75"
            style="z-index: 1050; display: none;">
            <button id="PrevButton" onclick="PrevImage()"
                class="btn btn-light position-absolute start-0 ms-3">←</button>
            <span id="CloseButton" onclick="CloseFullScreen()" class="btn btn-danger position-absolute top-0 end-0 m-3"
                style="cursor: pointer;">✕</span>

            <img id="FullImage" class="img-fluid rounded shadow" style="max-height: 90vh;" />
            <button id="NextButton" onclick="NextImage()" class="btn btn-light position-absolute end-0 me-3">→</button>
        </div>

    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            
            const fullScreen = document.getElementById("FullScreenImage");
            fullScreen.classList.add("d-none");  
        });

        let images = Array.from(document.querySelectorAll(".row img"));
        let currentIndex = 0;

        function FullScreen(imgLink) {
            const fullImage = document.getElementById("FullImage");
            const fullScreen = document.getElementById("FullScreenImage");
            fullScreen.classList.remove("d-none");

            currentIndex = images.findIndex(img => img.src === imgLink);
            fullImage.src = imgLink;
            fullScreen.style.display = "flex";
        }

        function CloseFullScreen() {
            document.getElementById("FullScreenImage").classList.add("d-none");
        }

        function NextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            document.getElementById("FullImage").src = images[currentIndex].src;
        }

        function PrevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            document.getElementById("FullImage").src = images[currentIndex].src;
        }
    </script>
