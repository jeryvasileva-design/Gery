<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <title>Вход и Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background-color: #FAF3EB;
            font-family: 'Sofia Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-wine {
            background-color: #914E59;
        }

        .text-wine {
            color: #914E59;
        }

        .form-control-underline {
            border: none;
            border-bottom: 1px solid #ccc;
            border-radius: 0;
            background-color: transparent;
            padding-left: 0;
        }

        .flip-main-container {
            perspective: 2000px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .flip-card-inner {
            width: 1000px;
            max-width: 95%;
            height: 650px;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .is-flipped {
            transform: rotateY(180deg);
        }

        .auth-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .auth-back {
            transform: rotateY(180deg);
        }

        .side-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-custom {
            background-color: #914E59;
            color: white;
            padding: 12px 30px;
            border-radius: 6px;
            border: none;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            transition: 0.2s ease;
            overflow: hidden;
            background-color: #914E59;
            color: #FAF3EB;
        }
    </style>
</head>

<body>
    <header class="bg-wine py-3">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">
            <div class="logo-container">
                <a href="index.html">
                    <img src="./photos/logo1.png" alt="logo" style="max-width:180px; height:auto;">
                </a>
            </div>
            <nav class="d-none d-md-flex">
                <ul class="list-unstyled d-flex flex-row gap-4 mb-0 align-items-center">
                    <li><a href="information.html" class="text-light fw-bold text-decoration-none">Информация</a></li>
                    <li><a href="Gallery.html" class="text-light fw-bold text-decoration-none">Галерия</a></li>

                    <li><a href="login.html" class="text-light fw-bold text-decoration-none"
                            id="registerLink">Регистрация</a></li>

                    <li class="nav-item d-none" id="save">
                        <a class="nav-link text-light fw-bold text-decoration-none" href="SaveHour.html">Запази час</a>
                    </li>

                    <li class="nav-item d-none" id="acc">
                        <a class="nav-link text-light fw-bold text-decoration-none" href="account.html">Профил</a>
                    </li>
                </ul>
            </nav>
            <button class="btn text-light d-md-none border-0" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasNavbar">
                <span style="font-size: 1.5rem;">☰</span>
            </button>
        </div>
    </header>

    <div class="offcanvas offcanvas-end w-100" id="offcanvasNavbar" style="background-color: #FAF3EB;">
        <div class="offcanvas-header bg-wine text-light" style="padding: 8%;">
            <h5 class="offcanvas-title fw-bold" id="offcanvasNavbarLabel">Навигация</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
        </div>

        <div class="offcanvas-body p-0 position-relative">
            <img src="./photos/navPic.jpg" alt="background" class="position-absolute w-100 h-100 object-fit-cover"
                style="top: 0; left: 0; z-index: 1;">

            <nav class="position-relative d-flex justify-content-center align-items-center h-100" style="z-index: 2;">
                <ul class="list-unstyled d-flex flex-column gap-5 fs-5 align-items-center w-100"
                    style="background-color: #FAF3EB; padding-top: 8%; padding-bottom: 5%; margin-left: 18%; margin-right: 18%;">
                    <li><a href="index.html" class="text-dark fw-bold text-decoration-none custom-nav-link">Начална
                            страница</a></li>
                    <li><a href="information.html"
                            class="text-dark fw-bold text-decoration-none custom-nav-link">Информация</a></li>
                    <li><a href="Gallery.html"
                            class="text-dark fw-bold text-decoration-none custom-nav-link">Галерия</a></li>

                    <li><a href="login.html"
                            class="text-dark fw-bold text-decoration-none custom-nav-link">Регистрация</a></li>

                    <li class="nav-item d-none nav-save">
                        <a class="text-dark fw-bold text-decoration-none custom-nav-link" href="SaveHour.html">Запази
                            час</a>
                    </li>

                    <li class="nav-item d-none nav-acc">
                        <a class="text-dark fw-bold text-decoration-none custom-nav-link" href="account.html">Профил</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>


    <div class="flip-main-container">
        <div class="flip-card-inner" id="flipCard">

            <div class="auth-side auth-front">
                <div class="row g-0 h-100">
                    <div class="col-md-5 d-none d-md-block">
                        <img src="./photos/loginPhoto.jpg" class="side-img" alt="Login">
                    </div>
                    <div class="col-md-7 p-5 d-flex flex-column justify-content-center"
                        style="background-color: #FAF3EB;">
                        <h2 class="fw-bold text-dark display-6 mb-5">Здравейте отново!</h2>
                        <form id="login" action="php/Login.php" method="post">
                            <div class="mb-4">
                                <label class="fw-bold">Имейл</label>
                                <input type="email" class="form-control form-control-underline"
                                    placeholder="Вашият имейл" name="email">
                            </div>
                            <div class="mb-4">
                                <div class="d-flex justify-content-between">
                                    <label class=" fw-bold">Парола</label>
                                </div>
                                <input type="password" class="form-control form-control-underline"
                                    placeholder="••••••••" name="password">
                            </div>
                            <button type="submit" class="btn btn-custom mt-3">Вход в профил</button>
                            <div class="mt-5 text-center">
                                <p class="text-muted small">Нямате акаунт?
                                    <a href="javascript:void(0)" onclick="toggleFlip()"
                                        class="text-wine fw-bold text-decoration-none ms-1 border-bottom border-dark">Регистрация</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="auth-side auth-back">
                <div class="row g-0 h-100">
                    <div class="col-md-7 p-5 d-flex flex-column justify-content-center"
                        style="background-color: #FAF3EB;">
                        <h2 class="fw-bold text-dark display-6 mb-5">Регистрирай се за незабравими преживявания!</h2>
                        <form id="registation" action="php/Registration.php" method="post">
                            <div class="mb-4">
                                <label class="fw-bold">Име и фамилия</label>
                                <input type="text" class="form-control form-control-underline" placeholder="Вашето име"
                                    name="userName" id="username">
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold">Email</label>
                                <input type="email" class="form-control form-control-underline"
                                    placeholder="Вашият имейл" name="email" id="email">
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold">Парола</label>
                                <input type="password" class="form-control form-control-underline"
                                    placeholder="••••••••" name="password" id="password">
                            </div>
                            <button type="submit" class="btn btn-custom mt-3">Регистрирай се</button>
                            <div class="mt-5 text-center">
                                <p class="text-muted small">Вече имате профил?
                                    <a href="javascript:void(0)" onclick="toggleFlip()"
                                        class="text-wine fw-bold text-decoration-none ms-1 border-bottom border-dark">Влез
                                        в акаунт</a>
                                </p>
                            </div>
                        </form>
                    </div>
                    <div class="col-md-5 d-none d-md-block">
                        <img src="./photos/signPhoto.jpg" class="side-img" alt="Register">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function toggleFlip() {
            document.getElementById('flipCard').classList.toggle('is-flipped');
        }
    </script>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"

    crossorigin="anonymous"></script>

</html>
